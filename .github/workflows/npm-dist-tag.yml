name: npm dist-tag

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package name (e.g., paykitjs, @paykitjs/stripe)"
        required: true
        type: string
      version:
        description: "Version to tag (e.g., 0.2.0)"
        required: true
        type: string
      tag:
        description: "npm dist-tag to apply (e.g., latest)"
        required: true
        type: string
        default: "latest"

permissions: {}

jobs:
  dist-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Add dist-tag
        run: npm dist-tag add "${PACKAGE}@${VERSION}" "${TAG}"
        env:
          PACKAGE: ${{ inputs.package }}
          VERSION: ${{ inputs.version }}
          TAG: ${{ inputs.tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
